# Default values for php-app.
# Override these values in a separate values file — never commit secrets.

replicaCount: 1

# PHP-FPM application image
image:
  repository: triplom/phpfpm-app
  tag: "0.2.2"
  pullPolicy: IfNotPresent

# Nginx sidecar image (pinned — do not use :latest)
nginxImage:
  repository: bitnami/nginx
  tag: "1.25"
  pullPolicy: IfNotPresent

# Nginx service — exposed externally
nginxService:
  name: nginx
  type: NodePort
  session: None
  externalPort: 8080
  internalPort: 8080

# PHP-FPM service — internal only, never exposed outside the cluster
phpfpmService:
  name: phpfpm
  type: ClusterIP
  phpfpmPort: 9000

# Ingress (disabled by default)
ingress:
  enabled: false
  # Annotate as needed for your ingress controller
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - chart-example.local
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# Resource requests/limits for the PHP-FPM container
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Resource requests/limits for the Nginx container
nginxResources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# MariaDB subchart configuration
# Credentials must be overridden at deploy time — do NOT store real passwords here
mariadb:
  enabled: true
  auth:
    rootPassword: ""      # Override: --set mariadb.auth.rootPassword=<secret>
    database: appdb
    username: appuser
    password: ""          # Override: --set mariadb.auth.password=<secret>
  primary:
    persistence:
      enabled: true
      size: 8Gi
