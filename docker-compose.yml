networks:
  app-tier:
    driver: bridge

services:
  phpfpm:
    image: triplom/phpfpm-app:0.2.2
    restart: unless-stopped
    networks:
      - app-tier
    env_file:
      - .env
    volumes:
      - ./app:/app:ro

  nginx:
    image: bitnami/nginx:latest
    restart: unless-stopped
    depends_on:
      - phpfpm
    networks:
      - app-tier
    ports:
      - '8080:8080'
    volumes:
      - ./app/server_blocks:/opt/bitnami/nginx/conf/server_blocks
      - ./app:/app:ro

  mariadb:
    image: bitnami/mariadb:latest
    restart: unless-stopped
    networks:
      - app-tier
    env_file:
      - .env
    volumes:
      - mariadb_data:/bitnami/mariadb

volumes:
  mariadb_data:
    driver: local
